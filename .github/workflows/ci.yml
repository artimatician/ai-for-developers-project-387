name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          npx --yes -p @commitlint/cli@latest -p @commitlint/config-conventional@latest \
            commitlint \
            --from ${{ github.event.pull_request.base.sha || github.event.before }} \
            --to ${{ github.event.after || github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache spec node_modules
        uses: actions/cache@v4
        with:
          path: spec/node_modules
          key: ${{ runner.os }}-spec-node-${{ hashFiles('spec/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-spec-node-

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-frontend-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-frontend-node-

      - name: Spec validation
        run: |
          cd spec
          npm ci
          npm test

      - name: Backend tests
        run: |
          pip install -r backend/requirements.txt
          python backend/manage.py test

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Install test dependencies
        run: pip install -r tests/requirements.txt

      - name: E2E API tests
        run: ./tests/run-tests.sh -m "not browser"

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker production image
        run: docker build --target prod -t calendar-ci . --build-arg PORT=8080

      - name: Run container for testing
        run: docker run -d -p 8080:8080 --name calendar-ci -e PRODUCTION_DB=true calendar-ci

      - name: Wait for health endpoint
        run: |
          timeout=30
          elapsed=0
          while [ $elapsed -lt $timeout ]; do
            if curl -s http://localhost:8080/api/health 2>/dev/null | grep -q '"ok"'; then
              echo "Health check passed"
              exit 0
            fi
            sleep 2
            elapsed=$((elapsed + 2))
          done
          echo "Health check timed out after ${timeout}s"
          curl -v http://localhost:8080/api/health 2>&1 || true
          exit 1

      - name: Verify frontend is served
        run: |
          html=$(curl -s http://localhost:8080/)
          echo "$html" | grep -q '<!DOCTYPE html' && echo "Frontend OK" || { echo "Frontend check failed"; exit 1; }

      - name: Cleanup container
        if: always()
        run: docker stop calendar-ci 2>/dev/null; docker rm calendar-ci 2>/dev/null
