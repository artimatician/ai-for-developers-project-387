name: Lighthouse Audit

on:
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      id-token: write
      contents: read
      issues: write
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build and start production container
        run: |
          docker build --target prod -t calendar-prod . --build-arg PORT=8080
          docker run -d -p 8080:8080 --name calendar-lh calendar-prod

      - name: Wait for health endpoint
        run: |
          for i in $(seq 1 15); do
            if curl -s http://localhost:8080/api/health 2>/dev/null | grep -q '"ok"'; then
              echo "Health check passed"
              exit 0
            fi
            sleep 2
          done
          echo "Health check timed out"
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Lighthouse
        run: |
          mkdir -p reports
          npx lighthouse http://localhost:8080 \
            --output=json \
            --output-path=./reports/lighthouse-report.json \
            --chrome-flags="--headless --no-sandbox --disable-gpu"

      - name: Check for performance regression
        id: check-regression
        run: |
          LCP=$(jq '.audits["largest-contentful-paint"].numericValue' reports/lighthouse-report.json)
          CLS=$(jq '.audits["cumulative-layout-shift"].numericValue' reports/lighthouse-report.json)
          TBT=$(jq '.audits["total-blocking-time"].numericValue' reports/lighthouse-report.json)
          LCP_BASELINE=6580
          CLS_BASELINE=0.001
          TBT_BASELINE=171
          SCORE=0

          [ "$(echo "$LCP > $LCP_BASELINE * 1.1" | bc -l)" = "1" ] && SCORE=$(echo "$SCORE + 0.5" | bc -l)
          [ "$(echo "$CLS > $CLS_BASELINE * 1.1" | bc -l)" = "1" ] && SCORE=$(echo "$SCORE + 0.3" | bc -l)
          [ "$(echo "$TBT > $TBT_BASELINE * 1.1" | bc -l)" = "1" ] && SCORE=$(echo "$SCORE + 0.2" | bc -l)

          REGRESSED="false"
          [ "$(echo "$SCORE >= 0.5" | bc -l)" = "1" ] && REGRESSED="true"

          echo "regressed=$REGRESSED" >> $GITHUB_OUTPUT

      - name: Analyze with OpenCode
        if: steps.check-regression.outputs.regressed == 'true'
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          prompt: |
            Read ./reports/lighthouse-report.json.
            Compare LCP, CLS, TBT with the values in
            docs/performance-baseline.md.
            For metrics that degraded by more than 10%,
            briefly identify likely culprits in recent commits and
            create a concise issue (max ~35 lines) with top 3 recommendations.
          model: ${{ vars.OPENCODE_MODEL_LIGHTHOUSE_WORKFLOW }}

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: reports/lighthouse-report.json
          retention-days: 30

      - name: Cleanup container
        if: always()
        run: docker stop calendar-lh 2>/dev/null; docker rm calendar-lh 2>/dev/null
